<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>pty relay</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <script type="importmap">
  { "imports": {
    "@xterm/xterm": "/vendor/xterm.mjs",
    "@xterm/addon-fit": "/vendor/addon-fit.mjs",
    "libsodium-sumo": "/vendor/libsodium-sumo.mjs",
    "libsodium-wrappers-sumo": "/vendor/libsodium-wrappers-sumo.mjs"
  } }
  </script>
  <style>
    :root {
      --vh: 100vh;
      --bg: #0a0a0a;
      --fg: #e0e0e0;
      --accent: #4a9eff;
      --bar-bg: #111;
      --btn-bg: #333;
      --btn-active: #668;
      --btn-locked: #88a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      height: var(--vh);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- Session List (TUI-style) ---
       Design notes:
       - Rows have real vertical breathing room (8px top/bottom). Tight
         rows scan poorly; this is a directory you read, not a packed
         data table.
       - Borders are #222 (solid) so the eye actually lands between
         rows. The previous dotted #1a1a1a was invisible against the
         #0a0a0a body.
       - The tags cell is its own flex row so the "+N" pill is
         shrink:0 and always visible, even when the inline tags
         overflow.
       - Hover effects are gated to `(hover: hover)` so touch devices
         don't get sticky-tap-state lingering on the last row touched.
       - Below 720px we collapse the grid into a two-line stacked
         layout per row — at phone widths a four-column grid forces
         every cell to truncate to a few characters.
    */
    #session-list {
      display: none;
      flex-direction: column;
      height: var(--vh);
      padding: 16px 20px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    #session-list h1 {
      font-size: 11px;
      margin-bottom: 12px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: normal;
    }
    #session-list h1::before {
      content: "// ";
      color: #2a2a2a;
    }
    /* Toolbar above the listing — fuzzy filter input on the left,
       sort controls on the right. Both wrap on narrow widths. */
    .session-list-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 8px 8px 8px;
      flex-wrap: wrap;
    }
    .filter-input-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1;
      min-width: 0;
      border-bottom: 1px solid #2a2a2a;
      padding: 2px 0;
      transition: border-color 80ms linear;
    }
    .filter-input-wrap:focus-within {
      border-bottom-color: var(--accent);
    }
    .filter-prompt {
      color: #555;
      font-weight: bold;
    }
    .filter-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      color: var(--fg);
      border: none;
      outline: none;
      font: inherit;
      padding: 0;
    }
    .filter-input::placeholder { color: #444; }
    .sort-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sort-label { color: #555; }
    .sort-btn {
      background: transparent;
      border: none;
      color: #888;
      font: inherit;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      padding: 2px 4px;
    }
    .sort-btn.active { color: var(--accent); }
    @media (hover: hover) {
      .sort-btn:hover { color: #ccc; }
      .sort-btn.active:hover { color: var(--accent); }
    }
    .session-list-header {
      display: grid;
      /* cwd gets a touch more weight (1.6fr -> 1.8fr) and the cmd
         column tightens slightly — friend feedback says cwd is the
         most-scanned field. */
      grid-template-columns: 18ch 14ch minmax(22ch, 1.8fr) minmax(20ch, 1.4fr);
      gap: 2ch;
      padding: 6px 8px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
      border-bottom: 1px solid #2a2a2a;
    }
    .session-rows { display: contents; }
    .session-row {
      display: grid;
      grid-template-columns: 18ch 14ch minmax(22ch, 1.8fr) minmax(20ch, 1.4fr);
      gap: 2ch;
      padding: 8px;
      cursor: pointer;
      color: #ccc;
      border-bottom: 1px solid #161616;
      position: relative;
      transition: background 80ms linear;
    }
    /* Leading scan marker — a faint dot in the gutter so the eye has
       something to land on per row. Pure decoration; doesn't take
       layout space. */
    .session-row::before {
      content: "·";
      color: #333;
      position: absolute;
      left: -10px;
      top: 8px;
    }
    .session-row .col {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .session-row .col-name { color: #e0e0e0; }
    .session-row .col-cmd { color: #888; }
    /* cwd is the most-scanned field — bump it lighter than cmd. */
    .session-row .col-cwd { color: #b0b0b0; }
    /* Tags cell is its own flex row so the "+N" pill is shrink-proof. */
    .session-row .col-tags {
      color: #6da;
      display: flex;
      align-items: center;
      gap: 1ch;
    }
    .session-row .col-tags .tag-inline {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1 1 auto;
    }
    .session-row .col-tags .tag-more {
      flex: 0 0 auto;
      color: var(--accent);
      cursor: pointer;
      padding: 0 6px;
      border: 1px solid #234;
      border-radius: 2px;
      font-size: 11px;
    }
    @media (hover: hover) {
      .session-row:hover { background: #111; }
      .session-row:hover::before { color: var(--accent); }
      .session-row .col-tags .tag-more:hover {
        background: #1a2433;
        border-color: var(--accent);
      }
    }
    .session-row.expanded { background: #0d0d0d; }
    .session-row.expanded .col-tags {
      flex-wrap: wrap;
    }
    .session-row.expanded .col-tags .tag-inline {
      white-space: normal;
      overflow: visible;
    }
    .session-row.new-session-row {
      border-bottom: 0;
      margin-top: 4px;
    }
    .session-row.new-session-row::before {
      content: none;
    }
    .session-row .new-session-cta {
      grid-column: 1 / -1;
      color: var(--accent);
      cursor: pointer;
    }
    .session-row.empty {
      /* Override the row grid; we just want a single italic line. */
      display: block;
      color: #666;
      cursor: default;
      font-style: italic;
      padding: 12px 8px;
    }
    .session-row.empty::before { content: none; }

    /* Phone widths: stack each row into three lines so we can fit
       readable values instead of 6-character truncations. cwd lives
       directly under the name (not under cmd) — it's what users
       actually scan for. */
    @media (max-width: 720px) {
      .session-list-header { display: none; }
      .session-row {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto;
        gap: 4px 1ch;
        padding: 10px 8px;
      }
      .session-row .col-name {
        grid-row: 1;
        grid-column: 1;
        font-weight: bold;
      }
      .session-row .col-cmd {
        grid-row: 1;
        grid-column: 2;
        text-align: right;
        font-size: 11px;
      }
      .session-row .col-cwd {
        grid-row: 2;
        grid-column: 1 / -1;
      }
      .session-row .col-tags {
        grid-row: 3;
        grid-column: 1 / -1;
        font-size: 11px;
      }
      .session-row.empty,
      .session-row.new-session-row {
        grid-template-columns: 1fr;
      }
    }

    /* --- Terminal --- */
    #terminal-view {
      display: none;
      flex-direction: column;
      height: var(--vh);
    }
    #toolbar {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background: #111;
      border-bottom: 1px solid #333;
      min-height: 36px;
    }
    #toolbar .session-name {
      flex: 1;
      font-size: 13px;
      font-weight: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #toolbar button {
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    #terminal-container {
      flex: 1;
      overflow: hidden;
    }

    /* --- Mobile Keyboard --- */
    #keyboard {
      background: #111;
      border-top: 1px solid #333;
    }
    #quick-bar {
      display: flex;
      overflow-x: auto;
      padding: 4px 6px;
      gap: 4px;
      -webkit-overflow-scrolling: touch;
    }
    #quick-bar::-webkit-scrollbar { display: none; }
    .kb-btn {
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      padding: 6px 10px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 36px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }
    .kb-btn.active { background: var(--btn-active); color: #fff; }
    .kb-btn.locked { background: var(--btn-locked); color: #fff; }
    #key-panel {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      padding: 6px;
    }
    #text-input-bar {
      display: none;
      padding: 6px;
      gap: 6px;
    }
    #text-input-bar input {
      flex: 1;
      background: #1a1a1a;
      color: var(--fg);
      border: 1px solid #333;
      border-radius: 2px;
      padding: 6px 10px;
      font-size: 14px;
      outline: none;
    }
    #text-input-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    /* --- Loading / Error --- */
    #status-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--vh);
      font-size: 15px;
      color: #666;
    }

    /* --- Floating reopen keyboard button --- */
    #kb-reopen {
      display: none;
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="status-overlay">Connecting...</div>

  <div id="session-list">
    <h1>Sessions</h1>
    <div id="sessions-container"></div>
  </div>

  <div id="terminal-view">
    <div id="toolbar">
      <span class="session-name" id="session-name-label"></span>
      <button id="detach-btn">Detach</button>
    </div>
    <div id="terminal-container"></div>
    <div id="keyboard">
      <div id="quick-bar"></div>
      <div id="key-panel"></div>
      <div id="text-input-bar">
        <input type="text" id="text-input" autocorrect="on" autocapitalize="sentences" placeholder="Type command...">
        <button id="text-send-btn">Send</button>
        <button id="text-back-btn" class="kb-btn">Bar</button>
      </div>
    </div>
  </div>
  <button id="kb-reopen">&#9000;</button>

  <script type="module" src="./main.js"></script>
</body>
</html>
