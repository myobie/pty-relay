<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>pty relay</title>
  <link rel="stylesheet" href="/vendor/xterm.css">
  <script type="importmap">
  { "imports": {
    "@xterm/xterm": "/vendor/xterm.mjs",
    "@xterm/addon-fit": "/vendor/addon-fit.mjs",
    "@xterm/addon-webgl": "/vendor/addon-webgl.mjs",
    "libsodium-sumo": "/vendor/libsodium-sumo.mjs",
    "libsodium-wrappers-sumo": "/vendor/libsodium-wrappers-sumo.mjs"
  } }
  </script>
  <style>
    :root {
      --vh: 100vh;
      --bg: #0a0a0a;
      --fg: #e0e0e0;
      --accent: #4a9eff;
      --bar-bg: #111;
      --btn-bg: #333;
      --btn-active: #668;
      --btn-locked: #88a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* Lock the document so the browser's own scroll can never engage.
       Combined effect of these rules:
         - `overscroll-behavior: none` on html+body kills the pull-to-
           refresh and rubber-band hooks on iOS 16+, Chrome, Firefox.
         - `overflow: hidden` on BOTH the html and body layers — body
            alone is not enough on iOS, the document layer can still
            present a scroll surface.
         - `position: fixed; top:0; left:0; right:0` on body anchors it
            to the top of the layout viewport. With `height: var(--vh)`
            (driven from visualViewport.height), body shrinks when the
            soft keyboard opens so the toolbar/terminal/keyboard
            chrome fits in the visible region without the document
            having to scroll the input back into view.
         - html *also* uses `height: var(--vh)`. iOS Safari does not
            shrink the layout viewport when the soft keyboard opens —
            it ignores `interactive-widget=resizes-content` and
            renders the keyboard as an overlay (this is the
            documented behavior on iOS 16; iOS 17 added partial
            support but only on form-target keyboards). If html stays
            at the layout viewport's full height while body shrinks
            to var(--vh), the difference is "empty document space"
            inside html that iOS happily rubber-bands into when the
            user pans near the top/bottom — visible as a few pixels
            of scroll while the textarea is focused. Sizing html to
            var(--vh) too makes the document exactly as tall as the
            visible region; there is no extra space to scroll into.
         - `touch-action: manipulation` disables iOS double-tap-to-zoom
           (a 300ms input-delay tax) while leaving inner-scroller
           panning untouched.
         - `viewport-fit=cover` + safe-area padding pad against the
           iOS notch / home indicator on iPhones with a physical
           cutout, so toolbar buttons don't sit under the status bar.
       Internal scrollers (`#session-list`, the terminal scrollback)
       live inside their own clipped boxes with `overscroll-behavior:
       contain` so their inertia stops at their edges instead of
       bubbling out to the document.
       Net effect: the page is a fixed pane; nothing the user does at
       the document level scrolls. */
    html, body {
      overscroll-behavior: none;
      overflow: hidden;
      width: 100%;
      height: var(--vh);
      /* Hide any latent native scrollbar that might appear during
         layout transitions (Safari sometimes flashes one for a frame
         while the keyboard slides up). Inner scrollers that DO need
         scrollbars (terminal scrollback, textarea) suppress them
         individually too. */
      scrollbar-width: none;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    /* `touch-action: none` on the document root prevents iOS from
       interpreting body-level pan gestures as scroll attempts (which
       it tries even with overflow:hidden — the gesture just snaps
       back, which is the visible-jitter the user reports as "still
       some scroll"). Touch events themselves still fire, so the
       quick-bar buttons, the terminal-container custom scroll
       handler, and the textarea all keep working. Inner scrollers
       that need pan opt back in below (`#session-list` pan-y,
       `#quick-bar` pan-x, `#text-input-bar textarea` auto). */
    body { touch-action: none; }
    html { touch-action: manipulation; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      /* `position: fixed` belt-and-suspenders. With both html and
         body sized to var(--vh), the document already collapses to
         the visible region — but iOS Safari has had historical bugs
         where focusing an input still mutated body.scrollTop. Fixing
         body removes any residual scroll surface inside it. */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      /* Pad against iOS notch / home indicator. No-op on devices
         without a cutout. */
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }

    /* --- Session List (TUI-style) ---
       Design notes:
       - Rows have real vertical breathing room (8px top/bottom). Tight
         rows scan poorly; this is a directory you read, not a packed
         data table.
       - Borders are #222 (solid) so the eye actually lands between
         rows. The previous dotted #1a1a1a was invisible against the
         #0a0a0a body.
       - The tags cell is its own flex row so the "+N" pill is
         shrink:0 and always visible, even when the inline tags
         overflow.
       - Hover effects are gated to `(hover: hover)` so touch devices
         don't get sticky-tap-state lingering on the last row touched.
       - Below 720px we collapse the grid into a two-line stacked
         layout per row — at phone widths a four-column grid forces
         every cell to truncate to a few characters.
    */
    #session-list {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 100%;
      padding: 16px 20px;
      /* overflow-y: auto promotes overflow-x to auto per the CSS
         spec when the other axis is `visible`. Set both explicitly
         so a long cwd / tag value can't trigger horizontal scroll —
         it should clip cleanly within the row's ellipsis instead.
         overscroll-behavior: contain stops this scroller's inertia
         from bubbling out and reaching the document — important
         on iOS where reaching the top/bottom of an inner scroller
         would otherwise re-engage the document's pull-to-refresh
         even with body locked. */
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      /* body's `touch-action: none` blocks default panning at the
         document level — opt this scroller back in for vertical
         touch-pan. */
      touch-action: pan-y;
      scrollbar-width: none;
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    #session-list::-webkit-scrollbar { display: none; }
    #session-list h1 {
      font-size: 11px;
      margin-bottom: 12px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: normal;
    }
    #session-list h1::before {
      content: "// ";
      color: #2a2a2a;
    }
    /* Toolbar above the listing — fuzzy filter input on the left,
       sort controls on the right. Both wrap on narrow widths. */
    .session-list-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 8px 8px 8px;
      flex-wrap: wrap;
    }
    .filter-input-wrap {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1;
      min-width: 0;
      border-bottom: 1px solid #2a2a2a;
      padding: 2px 0;
      transition: border-color 80ms linear;
    }
    .filter-input-wrap:focus-within {
      border-bottom-color: var(--accent);
    }
    .filter-prompt {
      color: #555;
      font-weight: bold;
    }
    .filter-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      color: var(--fg);
      border: none;
      outline: none;
      font: inherit;
      padding: 0;
    }
    .filter-input::placeholder { color: #444; }
    .sort-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #555;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .sort-label { color: #555; }
    .sort-btn {
      background: transparent;
      border: none;
      color: #888;
      font: inherit;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      padding: 2px 4px;
    }
    .sort-btn.active { color: var(--accent); }
    @media (hover: hover) {
      .sort-btn:hover { color: #ccc; }
      .sort-btn.active:hover { color: var(--accent); }
    }
    .session-list-header {
      display: grid;
      /* cwd gets a touch more weight (1.6fr -> 1.8fr) and the cmd
         column tightens slightly — friend feedback says cwd is the
         most-scanned field. */
      grid-template-columns: 18ch minmax(14ch, 1.2fr) minmax(22ch, 1.8fr) minmax(20ch, 1.4fr);
      gap: 2ch;
      padding: 6px 8px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
      border-bottom: 1px solid #2a2a2a;
    }
    .session-rows { display: contents; }
    .session-row {
      display: grid;
      grid-template-columns: 18ch minmax(14ch, 1.2fr) minmax(22ch, 1.8fr) minmax(20ch, 1.4fr);
      gap: 2ch;
      padding: 8px;
      cursor: pointer;
      color: #ccc;
      border-bottom: 1px solid #161616;
      position: relative;
      transition: background 80ms linear;
    }
    /* Leading scan marker — a faint dot in the gutter so the eye has
       something to land on per row. Pure decoration; doesn't take
       layout space. Hidden on phone widths where there's no gutter
       to land in (and the negative `left` could push horizontal
       scroll on a parent that hasn't clipped overflow-x yet). */
    .session-row::before {
      content: "·";
      color: #333;
      position: absolute;
      left: -10px;
      top: 8px;
    }
    @media (max-width: 720px) {
      .session-row::before { content: none; }
    }
    .session-row .col {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .session-row .col-name { color: #e0e0e0; }
    .session-row .col-name .col-age {
      color: #555;
      font-size: 0.85em;
      font-weight: normal;
      margin-left: 0.5ch;
    }
    .session-row .col-cmd { color: #888; }
    /* cwd is the most-scanned field — bump it lighter than cmd. */
    .session-row .col-cwd { color: #b0b0b0; }
    /* Tags cell is its own flex row so the "+N" pill is shrink-proof. */
    .session-row .col-tags {
      color: #6da;
      display: flex;
      align-items: center;
      gap: 1ch;
    }
    .session-row .col-tags .tag-inline {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1 1 auto;
    }
    .session-row .col-tags .tag-more {
      flex: 0 0 auto;
      color: var(--accent);
      cursor: pointer;
      padding: 0 6px;
      border: 1px solid #234;
      border-radius: 2px;
      font-size: 11px;
    }
    @media (hover: hover) {
      .session-row:hover { background: #111; }
      .session-row:hover::before { color: var(--accent); }
      .session-row .col-tags .tag-more:hover {
        background: #1a2433;
        border-color: var(--accent);
      }
    }
    .session-row.expanded { background: #0d0d0d; }
    .session-row.expanded .col-tags {
      flex-wrap: wrap;
    }
    .session-row.expanded .col-tags .tag-inline {
      white-space: normal;
      overflow: visible;
    }
    .session-row.new-session-row {
      border-bottom: 0;
      margin-top: 4px;
    }
    .session-row.new-session-row::before {
      content: none;
    }
    .session-row .new-session-cta {
      grid-column: 1 / -1;
      color: var(--accent);
      cursor: pointer;
    }
    .session-row.empty {
      /* Override the row grid; we just want a single italic line. */
      display: block;
      color: #666;
      cursor: default;
      font-style: italic;
      padding: 12px 8px;
    }
    .session-row.empty::before { content: none; }

    /* Phone widths: stack each row into three lines so we can fit
       readable values instead of 6-character truncations. cwd lives
       directly under the name (not under cmd) — it's what users
       actually scan for.
       grid-template-columns uses `minmax(0, …)` on BOTH columns:
       without the min-width:0, a long cmd string grows to its
       intrinsic width and squeezes name to zero (see issue with
       `bash -c '…long…'` cmds blanking session names). The name
       column gets 1fr of remaining space, cmd is capped at 14ch
       (~110px) and ellipsis-truncated by .col's text-overflow. */
    @media (max-width: 720px) {
      .session-list-header { display: none; }
      .session-row {
        grid-template-columns: minmax(0, 1fr) minmax(0, 14ch);
        grid-template-rows: auto auto auto;
        gap: 4px 1ch;
        padding: 10px 8px;
        max-width: 100%;
        min-width: 0;
      }
      .session-row .col-name {
        grid-row: 1;
        grid-column: 1;
        font-weight: bold;
      }
      .session-row .col-cmd {
        grid-row: 1;
        grid-column: 2;
        text-align: right;
        font-size: 11px;
      }
      .session-row .col-cwd {
        grid-row: 2;
        grid-column: 1 / -1;
      }
      .session-row .col-tags {
        grid-row: 3;
        grid-column: 1 / -1;
        font-size: 11px;
      }
      .session-row.empty,
      .session-row.new-session-row {
        grid-template-columns: 1fr;
      }
    }

    /* --- Terminal --- */
    #terminal-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    #toolbar {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background: #111;
      border-bottom: 1px solid #333;
      min-height: 36px;
    }
    #toolbar .session-name {
      flex: 1;
      font-size: 13px;
      font-weight: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #toolbar button {
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 6px;
    }
    /* Compact one-line stat indicator next to the session name. Updates
       every render via the latency tracker. Click "Stats" to copy a
       fuller breakdown to the clipboard. */
    .latency-stat {
      color: #555;
      font-size: 11px;
      margin: 0 8px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      white-space: nowrap;
    }
    .latency-stat.warn { color: #c80; }
    .latency-stat.bad { color: #c44; }
    /* Brief flash after a successful copy. */
    #stats-btn.copied { background: #234; color: var(--accent); }

    /* Session info panel — keep visually subordinate to the terminal.
       Same dark surface as the toolbar so it reads as a continuation,
       not a popover. The grid lays out a definition list of label →
       value pairs that wraps cleanly on narrow widths. */
    #session-info-panel {
      background: #0d0d0d;
      border-bottom: 1px solid #222;
      padding: 8px 14px;
      font-size: 12px;
      color: #aaa;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 14px;
      align-items: baseline;
    }
    #session-info-panel[hidden] { display: none; }
    #session-info-panel .label {
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 10px;
      white-space: nowrap;
    }
    #session-info-panel .value {
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-word;
    }
    #session-info-panel .value.tags { color: #6da; }
    #session-info-panel .empty {
      grid-column: 1 / -1;
      color: #666;
      font-style: italic;
    }
    #info-btn[aria-expanded="true"] { background: var(--btn-active); }

    /* Toast stack for in-page notifications (used as fallback when
       system Notification API isn't available — Android Chrome,
       iOS, denied permission). Bottom-right, stacks newest on top
       via column-reverse so the most recent message is highest. */
    #pty-toast-stack {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 10000;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
      max-width: calc(100vw - 24px);
    }
    .pty-toast {
      background: #1a1a1a;
      border: 1px solid #333;
      border-left: 3px solid var(--accent);
      border-radius: 2px;
      padding: 10px 14px;
      max-width: 320px;
      pointer-events: auto;
      cursor: pointer;
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      animation: pty-toast-in 200ms ease;
    }
    .pty-toast-title {
      font-weight: bold;
      color: var(--fg);
    }
    .pty-toast-body {
      color: #aaa;
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .pty-toast-dismissing {
      animation: pty-toast-out 200ms ease forwards;
    }
    @keyframes pty-toast-in {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes pty-toast-out {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(20px); opacity: 0; }
    }

    /* Text-selection overlay (mobile-friendly). xterm.js renders into
       a canvas so iOS native long-press selection has nothing to grab;
       we render a snapshot of the buffer in a `<pre>` so the system
       selection UI can attach. Full-screen, dark TUI styling, dismiss
       by tapping outside the panel or hitting Close. */
    #text-select-overlay {
      position: fixed;
      inset: 0;
      z-index: 10001;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      animation: tso-fade-in 120ms ease;
    }
    @keyframes tso-fade-in { from { opacity: 0; } to { opacity: 1; } }
    #text-select-overlay .tso-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #111;
      border-bottom: 1px solid #333;
      flex: 0 0 auto;
    }
    #text-select-overlay .tso-title {
      flex: 1;
      color: #888;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #text-select-overlay .tso-btn {
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    #text-select-overlay .tso-btn.tso-copied {
      background: #234;
      color: var(--accent);
    }
    #text-select-overlay .tso-close { background: #2a2a2a; }
    #text-select-overlay .tso-text {
      flex: 1;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 12px 14px;
      margin: 0;
      background: #0a0a0a;
      color: var(--fg);
      font-family: 'SF Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
      /* Selection MUST work — override any inherited `user-select:
         none` from .kb-btn etc. and add the iOS-specific opt-in
         (`-webkit-touch-callout: default` enables long-press menus
         on touch devices that have them disabled by default). */
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
      /* Wrap rather than horizontal-scroll: long lines on a phone
         become unreadable and break the selection flow. white-space:
         pre-wrap preserves the line breaks but lets long lines wrap. */
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 13px;
      line-height: 1.4;
    }

    /* Health indicator: small filled circle, color reflects current
       connection state. data-state controls color via attribute
       selectors so JS only needs setAttribute. */
    .health-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 6px 0 4px;
      border-radius: 50%;
      vertical-align: middle;
      transition: background-color 200ms linear, box-shadow 200ms linear;
    }
    .health-indicator[data-state="unknown"] { background: #444; }
    .health-indicator[data-state="ok"]   { background: #4caf50; }
    .health-indicator[data-state="warn"] { background: #c80; box-shadow: 0 0 4px #c80; }
    .health-indicator[data-state="bad"]  { background: #c44; box-shadow: 0 0 5px #c44; }
    #terminal-container {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      /* `contain` lets the browser skip layout/paint outside this
         box when only its descendants change (xterm rerenders are
         frequent). Big win on mobile Safari, which otherwise
         invalidates the whole document on every renderer paint
         under certain GPU/canvas combinations. */
      contain: strict;
      /* Our custom touch handler (main.ts) reads touchstart/move/end
         directly and decides tap-vs-scroll itself; touch-action:none
         tells iOS not to interpret these touches as a default scroll
         gesture (it wouldn't scroll anyway — the container itself
         has overflow:hidden — but iOS still tries, which leaks a
         frame of motion). */
      touch-action: none;
    }

    /* --- Mobile Keyboard --- */
    #keyboard {
      background: #111;
      border-top: 1px solid #333;
    }
    #quick-bar {
      display: flex;
      overflow-x: auto;
      overscroll-behavior: contain;
      /* Opt back into horizontal pan since body has touch-action:
         none. The on-screen key strip is wider than the viewport
         and the user needs to swipe horizontally to reach the
         right-side keys (F-keys, Insert, etc.). */
      touch-action: pan-x;
      padding: 4px 6px;
      gap: 4px;
      -webkit-overflow-scrolling: touch;
    }
    #quick-bar::-webkit-scrollbar { display: none; }
    .kb-btn {
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      padding: 6px 10px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      min-width: 36px;
      text-align: center;
      -webkit-user-select: none;
      user-select: none;
    }
    .kb-btn.active { background: var(--btn-active); color: #fff; }
    .kb-btn.locked { background: var(--btn-locked); color: #fff; }
    #key-panel {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      padding: 6px;
    }
    #text-input-bar {
      display: none;
      padding: 6px;
      gap: 6px;
      /* Align bottom so the buttons stay anchored to the bottom of
         the bar as the textarea grows upward to its max-height. */
      align-items: flex-end;
    }
    #text-input-bar textarea {
      flex: 1;
      background: #1a1a1a;
      color: var(--fg);
      border: 1px solid #333;
      border-radius: 2px;
      padding: 6px 10px;
      /* iOS Safari zooms in on focus when input font-size < 16px.
         Pin to 16px so the zoom-in animation doesn't fire. */
      font-size: 16px;
      outline: none;
      resize: none;
      /* Auto-grow up to 3 lines, then scroll inside the textarea.
         field-sizing: content lets the box size to its content
         (Chrome 123+, Safari 17.4+). The fallback path (older
         browsers) just stays at the rows="1" min-height. */
      font-family: inherit;
      line-height: 1.4;
      field-sizing: content;
      min-height: calc(1em * 1.4 + 12px);
      max-height: calc(3em * 1.4 + 12px);
      overflow-y: auto;
      overscroll-behavior: contain;
      /* `touch-action: manipulation` opts back in to default text-
         input behaviors (insertion-cursor positioning, drag-select,
         internal scroll on long content) while still suppressing
         double-tap-zoom. */
      touch-action: manipulation;
      /* Hide the inner scrollbar past the 3-line cap. The textarea
         is still scrollable internally; suppressing the visible
         scrollbar keeps the bottom bar visually quiet (matches the
         "no scrollbars on this page, ever" UX directive). */
      scrollbar-width: none;
    }
    #text-input-bar textarea::-webkit-scrollbar { display: none; }
    #text-input-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 2px;
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    /* Keyboard-assist toggle: not a primary action — render as a
       muted ghost button. When raw mode is active (aria-pressed=true)
       lift the styling so the user can see at a glance the OS is
       being asked to stay out of the way. */
    #text-input-bar .kb-mode-btn {
      background: transparent;
      color: #888;
      border: 1px solid #333;
      padding: 6px 10px;
      font-size: 12px;
      min-width: 48px;
    }
    #text-input-bar .kb-mode-btn[aria-pressed="true"] {
      background: var(--btn-locked);
      color: #fff;
      border-color: var(--btn-locked);
    }

    /* --- Loading / Error --- */
    #status-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 0;
      font-size: 15px;
      color: #666;
    }

    /* --- Floating reopen keyboard button --- */
    #kb-reopen {
      display: none;
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: var(--btn-bg);
      color: var(--fg);
      border: none;
      border-radius: 2px;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="status-overlay">Connecting...</div>

  <div id="session-list">
    <h1>Sessions</h1>
    <div id="sessions-container"></div>
  </div>

  <div id="terminal-view">
    <div id="toolbar">
      <span class="session-name" id="session-name-label"></span>
      <span id="health-indicator" class="health-indicator" data-state="unknown" title="Connection health"></span>
      <span id="latency-stat" class="latency-stat" title="Click 'Stats' to copy a full latency summary"></span>
      <button id="info-btn" title="Show session details (tags, cwd, age)" aria-expanded="false" aria-controls="session-info-panel">Info</button>
      <button id="font-smaller-btn" title="Smaller terminal font" aria-label="Smaller terminal font">A−</button>
      <button id="font-larger-btn" title="Larger terminal font" aria-label="Larger terminal font">A+</button>
      <button id="select-btn" title="Open buffer in a selectable overlay (long-press to select on mobile)">Sel</button>
      <button id="stats-btn" title="Copy latency stats to clipboard">Stats</button>
      <button id="detach-btn">Detach</button>
    </div>
    <!-- Session info panel: collapsed by default, expanded by the
         Info button. Lives between toolbar and terminal so opening
         it shrinks the terminal slightly rather than overlapping it
         (we have a real layout, not a popover) — predictable and
         keyboard-accessible. -->
    <div id="session-info-panel" hidden></div>
    <div id="terminal-container"></div>
    <div id="keyboard">
      <div id="quick-bar"></div>
      <div id="key-panel"></div>
      <div id="text-input-bar">
        <button id="kb-mode-btn" class="kb-mode-btn" title="Toggle keyboard assist (autocorrect / autocapitalize)" aria-pressed="false" aria-label="Keyboard assist">abc</button>
        <textarea id="text-input" rows="1" autocorrect="on" autocapitalize="sentences" placeholder="Type..."></textarea>
        <button id="text-send-btn">Send</button>
        <button id="text-back-btn" class="kb-btn">←</button>
      </div>
    </div>
  </div>
  <button id="kb-reopen">&#9000;</button>

  <script type="module" src="./main.js"></script>
</body>
</html>
